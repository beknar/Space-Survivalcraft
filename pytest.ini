[pytest]
# By default, run only the fast unit-test suite. The headless-window
# integration tests under "unit tests/integration/" are slow (~3 s per
# test) and their shared Arcade window pollutes other tests' window-size
# math, so they're opt-in:
#
#   pytest "unit tests/"                       # fast suite (default)
#   pytest "unit tests/integration/"           # slow integration suite
#   pytest "unit tests/" "unit tests/integration/" --integration  # both
#
norecursedirs = integration .claude assets build dist venv __pycache__
